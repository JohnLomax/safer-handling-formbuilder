server {
    # IPv4 only — [::] fails nginx -t when the container has IPv6 disabled
    listen 80 default_server;
    server_name _;

    root /var/www/html;
    index router.php;

    client_max_body_size 32M;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Public form assets
    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 7d;
    }

    # Laravel Vite build output
    location /build/ {
        alias /var/www/html/backend/public/build/;
        try_files $uri =404;
        access_log off;
        expires 7d;
    }

    location = /favicon.ico {
        try_files /backend/public/favicon.ico =204;
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        try_files /backend/public/robots.txt =204;
        access_log off;
        log_not_found off;
    }

    # Everything else goes through the unified router (forms + Laravel admin)
    location / {
        include fastcgi_params;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/router.php;
        fastcgi_param SCRIPT_NAME /router.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html;
        fastcgi_read_timeout 120s;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
